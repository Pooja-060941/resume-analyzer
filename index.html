<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Analyzer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      margin: 0;
      padding: 0;
    }

    .container {
      width: 400px;
      margin: 60px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      color: #333;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea {
      resize: none;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #5a67d8;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      color: #444;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>✨ AI Resume Analyzer</h2>

  <input type="text" id="name" placeholder="👤 Student Name">

  <input type="text" id="email" placeholder="📧 Email">

  <input type="text" id="education" placeholder="🎓 Education (B.E, BCA...)">

  <textarea id="resume" rows="6" placeholder="📄 Paste your resume here..."></textarea>

  <button onclick="analyze()">Analyze</button>

  <div id="result"></div>

</div>

<script>
async function analyze() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const education = document.getElementById("education").value;
  const text = document.getElementById("resume").value;

  if (!name || !email || !education || !text) {
    alert("Please fill all fields");
    return;
  }

  const res = await fetch("/api/predict", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email, education, text })
  });

  const data = await res.json();

  document.getElementById("result").innerText =
    "🎯 Prediction: " + data.prediction;
}
</script>

</body>
</html>
